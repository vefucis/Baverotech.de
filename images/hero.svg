<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Valcprofila jumts (vietturis)">
  <rect width="1000" height="1000" fill="#ece9e3"/>

  <!-- debesis / rasējuma režģis -->
  <g stroke="#172944" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 70H1000M0 150H1000M0 230H1000M0 310H1000"/>
    <path d="M100 0V340M180 0V340M260 0V340M340 0V340M420 0V340M500 0V340M580 0V340M660 0V340M740 0V340M820 0V340M900 0V340"/>
  </g>

  <!-- fasāde -->
  <polygon points="60,660 1000,470 1000,1000 60,1000" fill="#15243c"/>
  <g stroke="#0e1b30" stroke-width="3" stroke-opacity="0.8">
    <path d="M180 636V1000M380 596V1000M580 556V1000M780 516V1000M900 492V1000"/>
  </g>
  <!-- logs -->
  <rect x="430" y="720" width="150" height="220" fill="#2b3f5e"/>
  <line x1="505" y1="720" x2="505" y2="940" stroke="#15243c" stroke-width="4"/>

  <!-- jumta plakne -->
  <polygon points="60,360 1000,150 1000,470 60,660" fill="#1f3454"/>
  <!-- valcprofila vīles -->
  <g stroke="#3a5680" stroke-width="3">
    <path d="M140 342V644M220 324V628M300 306V612M380 288V596M460 270V580M540 252V564M620 234V548M700 216V532M780 198V516M860 180V500M940 162V484"/>
  </g>
  <!-- kore -->
  <path d="M60 360 L1000 150" stroke="#466591" stroke-width="6" stroke-opacity="0.55"/>
  <!-- pārkares ēna -->
  <path d="M60 660 L1000 470" stroke="#0e1b30" stroke-width="5"/>
  <!-- oranžā gala mala (koka apdare) -->
  <path d="M60 360 L60 660" stroke="#ca672e" stroke-width="13"/>
</svg>

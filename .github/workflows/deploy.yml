name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Atļauj tikai vienu deploy vienlaikus
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache-busting versija (commit SHA)
        run: |
          SHA=${GITHUB_SHA::8}
          sed -i "s|href=\"css/styles.css\"|href=\"css/styles.css?v=${SHA}\"|g" index.html
          sed -i "s|src=\"js/main.js\"|src=\"js/main.js?v=${SHA}\"|g" index.html
          echo "Asset versija: ?v=${SHA}"
          grep -nE 'styles\.css|main\.js' index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
